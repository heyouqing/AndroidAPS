name: AAPS CI Fixed (No GDrive)


on:
  workflow_dispatch:
    inputs:
      buildVariant:
        description: 'Select Build Variant'
        required: true
        default: 'fullRelease'
        type: choice
        options:
          - fullRelease
          - fullDebug
          - aapsclientRelease
          - aapsclientDebug

jobs:
  build:
    name: Build Signed AAPS
    runs-on: ubuntu-latest
    
    steps:
      # ---------------------------------------------------------
      # 1. 解析密钥信息 (仅支持独立变量模式)
      # ---------------------------------------------------------
      - name: Parse Keystore Secrets
        run: |
          echo "🔐 Loading Independent Secrets..."
          
          KEYSTORE_BASE64="${{ secrets.KEYSTORE_BASE64 }}"
          KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
          KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

          # 导出到环境变量
          echo "KEYSTORE_BASE64=$KEYSTORE_BASE64" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV

          # 基础检查
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "❌ ERROR: Secrets are missing! Check Names: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
            exit 1
          fi
          echo "✅ Secrets loaded successfully."
          echo "   Alias: $KEY_ALIAS"
          echo "   Base64 Length: ${#KEYSTORE_BASE64}"

      # ---------------------------------------------------------
      # 2. 检出代码
      # ---------------------------------------------------------
      - uses: actions/checkout@v4

      # ---------------------------------------------------------
      # 3. 解码密钥文件到临时目录
      # ---------------------------------------------------------
      - name: Decode Keystore
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/keystore.jks"
          
          if [ ! -f "$RUNNER_TEMP/keystore/keystore.jks" ]; then
            echo "❌ ERROR: Failed to decode keystore!"
            exit 1
          fi
          echo "✅ Decoded to: $RUNNER_TEMP/keystore/keystore.jks"
          ls -l "$RUNNER_TEMP/keystore/keystore.jks"

      # ---------------------------------------------------------
      # 4. 验证密钥密码 (提前失败，节省时间)
      # ---------------------------------------------------------
      - name: Validate Keystore Password
        run: |
          echo "🔐 Validating password with jarsigner..."
          echo "test" > dummy.txt
          zip -q dummy.jar dummy.txt
          rm dummy.txt
          
          if ! jarsigner -keystore "$RUNNER_TEMP/keystore/keystore.jks" \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              dummy.jar "$KEY_ALIAS" 2>&1; then
            echo "❌ ERROR: Password or Alias is INCORRECT!"
            echo "   Check your Secrets (KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS)."
            echo "   Ensure no special characters in password."
            rm -f dummy.jar
            exit 1
          fi
          rm -f dummy.jar
          echo "✅ Password validation SUCCESSFUL."

      # ---------------------------------------------------------
      # 5. 【核心修复】狸猫换太子：覆盖默认 demokeystore.jks
      # ---------------------------------------------------------
      - name: Force Override Default Demokeystore
        run: |
          echo "💣 Executing Force Override Strategy..."
          
          # 1. 创建 Gradle 默认寻找的目录结构
          mkdir -p keystore
          
          # 2. 将我们的密钥复制过去，并重命名为它“想要”的名字
          cp "$RUNNER_TEMP/keystore/keystore.jks" keystore/demokeystore.jks
          
          echo "✅ Copied our key to: keystore/demokeystore.jks"
          ls -l keystore/demokeystore.jks
          
          # 3. (可选) 清理其他可能存在的干扰文件
          find . -name "demokeystore.jks" -not -path "./keystore/demokeystore.jks" -delete 2>/dev/null || true

      # ---------------------------------------------------------
      # 6. 设置构建变量
      # ---------------------------------------------------------
      - name: Set Build Variables
        run: |
          BV="${{ github.event.inputs.buildVariant }}"
          echo "BUILD_VARIANT=$BV" >> $GITHUB_ENV
          
          VF=$(echo "$BV" | sed -E 's/(Release|Debug)$//' | tr '[:upper:]' '[:lower:]')
          VT=$(echo "$BV" | grep -oE '(Release|Debug)$' | tr '[:upper:]' '[:lower:]')
          
          echo "VARIANT_FLAVOR=$VF" >> $GITHUB_ENV
          echo "VARIANT_TYPE=$VT" >> $GITHUB_ENV
          
          if [ -f buildSrc/src/main/kotlin/Versions.kt ]; then
            VER=$(grep 'val appVersion' buildSrc/src/main/kotlin/Versions.kt | awk -F '"' '{print $2}')
          else
            VER="custom"
          fi
          echo "VERSION=$VER" >> $GITHUB_ENV
          echo "🚀 Config: $BV ($VF/$VT) v$VER"

      # ---------------------------------------------------------
      # 7. 设置 JDK 17
      # ---------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ---------------------------------------------------------
      # 8. 构建 APK (使用相对路径指向被覆盖的文件)
      # ---------------------------------------------------------
      - name: Build APK
        run: |
          chmod +x gradlew
          
          echo "🔧 Injecting signing config into gradle.properties (Double Insurance)..."
          cat >> gradle.properties << EOF
android.injected.signing.store.file=keystore/demokeystore.jks
android.injected.signing.store.password=$KEYSTORE_PASSWORD
android.injected.signing.key.alias=$KEY_ALIAS
android.injected.signing.key.password=$KEY_PASSWORD
EOF
          echo "📄 gradle.properties tail:"
          tail -n 5 gradle.properties

          echo "🚀 Starting Gradle Build..."
          # 显式指定路径为 keystore/demokeystore.jks (因为我们刚才复制过去了)
          ./gradlew :app:assemble${{ env.BUILD_VARIANT }} \
            -Pandroid.injected.signing.store.file=keystore/demokeystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon --stacktrace

      # ---------------------------------------------------------
      # 9. 重命名并上传产物
      # ---------------------------------------------------------
      - name: Rename and Upload APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/${{ env.VARIANT_FLAVOR }}/${{ env.VARIANT_TYPE }} -name "*.apk" -exec cp {} output/aaps-${{ env.VERSION }}-${{ env.VARIANT_FLAVOR }}.apk \;
          
          echo "📦 Generated Files:"
          ls -l output/

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaps-${{ env.VERSION }}-${{ env.VARIANT_FLAVOR }}
          path: output/*.apk
          retention-days: 14
