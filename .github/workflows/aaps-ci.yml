name: AAPS CI (No GDrive)

on:
  workflow_dispatch:
    inputs:
      buildVariant:
        description: 'Select Build Variant'
        required: true
        default: 'fullRelease'
        type: choice
        options:
          - fullRelease
          - fullDebug

jobs:
  build:
    name: Build AAPS
    runs-on: ubuntu-latest
    steps:
      - name: Decode Secrets
        run: |
          if [ -n "${{ secrets.KEYSTORE_SET }}" ]; then
            DECODED=$(echo "${{ secrets.KEYSTORE_SET }}" | base64 -d)
            echo "KEYSTORE_BASE64=$(echo "$DECODED" | cut -d'|' -f1)" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=$(echo "$DECODED" | cut -d'|' -f2)" >> $GITHUB_ENV
            echo "KEY_ALIAS=$(echo "$DECODED" | cut -d'|' -f3)" >> $GITHUB_ENV
            echo "KEY_PASSWORD=$(echo "$DECODED" | cut -d'|' -f4)" >> $GITHUB_ENV
          else
            echo "KEYSTORE_BASE64=${{ secrets.KEYSTORE_BASE64 }}" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Check Secrets
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "❌ Missing Keystore Secrets"
            exit 1
          fi
          echo "✅ Secrets OK"

      - name: Decode keystore file
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/keystore.jks"

      - name: Validating keystore
        run: |
          echo "test" > dummy.txt
          zip -q dummy.jar dummy.txt
          if ! jarsigner -keystore "$RUNNER_TEMP/keystore/keystore.jks" -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" dummy.jar "$KEY_ALIAS"; then
            echo "❌ Password Incorrect"
            exit 1
          fi
          rm dummy.jar
          echo "✅ Password Correct"

      - uses: actions/checkout@v4

      - name: Set BUILD_VARIANT
        run: |
          BV="${{ github.event.inputs.buildVariant }}"
          echo "BUILD_VARIANT=$BV" >> $GITHUB_ENV
          VF=$(echo "$BV" | sed -E 's/(Release|Debug)$//' | tr '[:upper:]' '[:lower:]')
          VT=$(echo "$BV" | grep -oE '(Release|Debug)$' | tr '[:upper:]' '[:lower:]')
          echo "VARIANT_FLAVOR=$VF" >> $GITHUB_ENV
          echo "VARIANT_TYPE=$VT" >> $GITHUB_ENV

      - name: Extract VERSION
        run: |
          VER=$(grep 'val appVersion' buildSrc/src/main/kotlin/Versions.kt | awk -F '"' '{print $2}')
          echo "VERSION=$VER" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APKs
        run: |
          chmod +x gradlew
          ./gradlew :app:assemble${{ env.BUILD_VARIANT }} \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/keystore/keystore.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon

      - name: Rename APKs
        run: |
          mkdir -p output
          cp app/build/outputs/apk/${{ env.VARIANT_FLAVOR }}/${{ env.VARIANT_TYPE }}/*.apk output/aaps-${{ env.VERSION }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aaps-release
          path: output/*.apk
